<!--
  Requirement: Create the Dedicated Page for a Single Resource

  Instructions:
  This page displays the details for one resource and allows for discussion.
  All content is loaded dynamically by details.js using the resource id
  from the URL query string (e.g., details.html?id=1).
-->


<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> Resource Details </title>

    <link rel="stylesheet" href="../common/styles.css">

    <script src="details.js" defer></script>

</head>

<body>
    
    <header>
        <h1 id="resource-title"> Sample Resource Title </h1>
    </header>

    <main>
        
        <section>
            <article>
                <p id="resource-description">
                    This is a sample description of the resource. It explains the content briefly.
                </p>
                <a id="resource-link" href="https://www.iimchyderabad.com/Material/html.pdf" target="_blank">
                    Access Resource Material
                </a>
            </article>
        </section>

        <section id="discussion-forum">
            <h2>Discussion</h2>

            <div id="comment-list">
                <article>
                    <p>This is a sample comment.</p>
                    <footer>Posted by: Ali Hassan</footer>
                </article>
            </div>

            <form id="comment-form" action="#">
                <fieldset>
                    <legend>Leave a Comment</legend>

                    <label for="new-comment">Your Comment:</label>
                    <textarea id="new-comment" name="new-comment" required></textarea>

                    <button type="submit">Post Comment</button>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
