<!--
  Requirement: Create the General Discussion Board
  Instructions:
  This page lists all discussion topics and includes a form to create a new one.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding (UTF-8) -->
    <meta charset="UTF-8">

    <!-- Responsive viewport meta tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discussion Board</title>

    <!-- Link to your stylesheet (Assuming it is in a shared css folder) -->
    <link rel="stylesheet" href="../../css/style.css">

    <!-- Required: link board.js with defer so the DOM is ready before the script runs. -->
    <script src="board.js" defer></script>
</head>
<body>

    <header>
        <h1>General Discussion Board</h1>
    </header>

    <main>

        <!-- Section 1: Create a New Topic -->
        <section id="new-topic-section">
            <h2>Start a New Topic</h2>

            <form id="new-topic-form" action="#">
                <fieldset>
                    <legend>New Topic Details</legend>

                    <label for="topic-subject">Subject:</label>
                    <input id="topic-subject" type="text" required>

                    <br><br>

                    <label for="topic-message">Message:</label>
                    <textarea id="topic-message" rows="6" required></textarea>

                    <br><br>

                    <button id="create-topic" type="submit">Create Topic</button>
                </fieldset>
            </form>
        </section>

        <hr>

        <!-- Section 2: Existing Topics -->
        <section id="view-topics-section">
            <h2>All Topics</h2>

            <!-- Container to hold the list of topics (Required by board.js) -->
            <div id="topic-list-container">
                <!-- board.js will inject one <article> per topic here. -->
            </div>
        </section>

    </main>
</body>
</html>
