<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">
    
    <!-- Responsive viewport tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discussion Board</title>

    <!-- Placeholder for CSS framework or stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>General Discussion Board</h1>
    </header>

    <main>

        <!-- Section 1: Create a New Topic -->
        <section id="new-topic">
            <h2>Start a New Topic</h2>

            <form id="new-topic-form" action="#" method="POST">
                <fieldset>
                    <legend>New Topic Details</legend>

                    <p>
                        <label for="topic-subject">Subject:</label><br>
                        <input type="text" id="topic-subject" name="subject" required>
                    </p>

                    <p>
                        <label for="topic-message">Message:</label><br>
                        <textarea id="topic-message" name="message" rows="6" required></textarea>
                    </p>

                    <button id="create-topic" type="submit">Create Topic</button>
                </fieldset>
            </form>
        </section>

        <hr>

        <!-- Section 2: Existing Topics -->
        <section id="existing-topics">
            <h2>All Topics</h2>
            
            <div class="topics-list">
                
                <!-- Example Topic 1 -->
                <article class="topic-item">
                    <h3>
                        <a href="topic-detail.html">Question about CSS Flexbox</a>
                    </h3>
                    
                    <footer>
                        <small>Posted by: Alex Smith on 2024-05-20</small>
                    </footer>

                    <div class="topic-actions">
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </div>
                </article>

                <hr>

                <!-- Example Topic 2 -->
                <article class="topic-item">
                    <h3>
                        <a href="topic-detail.html">Best practices for JavaScript Async/Await</a>
                    </h3>
                    
                    <footer>
                        <small>Posted by: Jordan Lee on 2024-05-21</small>
                    </footer>

                    <div class="topic-actions">
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </div>
                </article>

                <hr>

                <!-- Example Topic 3 -->
                <article class="topic-item">
                    <h3>
                        <a href="topic-detail.html">How to deploy a Node.js app?</a>
                    </h3>
                    
                    <footer>
                        <small>Posted by: Taylor Wong on 2024-05-22</small>
                    </footer>

                    <div class="topic-actions">
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </div>
                </article>
            
            </div>
        </section>

    </main>

</body>
</html>
