<!--
  Requirement: Create the General Discussion Board
  Instructions:
  This page will list all discussion topics and include a form to create a new one.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding (UTF-8) -->
    <meta charset="UTF-8">
    
    <!-- Responsive viewport meta tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discussion Board</title>

    <!-- Link to CSS - Assuming a common style.css or your framework -->
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

    <header>
        <h1>General Discussion Board</h1>
    </header>

    <main>
        <!-- Section 1: Create a New Topic -->
        <section id="new-topic-section">
            <h2>Start a New Topic</h2>

            <form id="new-topic-form" action="#">
                <fieldset>
                    <legend>New Topic Details</legend>

                    <label for="topic-subject">Subject:</label>
                    <input id="topic-subject" type="text" name="subject" required>

                    <br><br>

                    <label for="topic-message">Message:</label>
                    <textarea id="topic-message" name="message" rows="6" required></textarea>

                    <br><br>

                    <button id="create-topic" type="submit">Create Topic</button>
                </fieldset>
            </form>
        </section>

        <hr>

        <!-- Section 2: Existing Topics -->
        <section id="topics-list-section">
            <h2>All Topics</h2>
            
            <!-- Container to hold the list of topics -->
            <div id="topics-container">
                
                <!-- Example Topic 1 -->
                <article class="topic-item">
                    <h3>
                        <a href="topic.html?id=1">Question about CSS Flexbox</a>
                    </h3>
                    
                    <footer>
                        <p>Posted by: Abdulaziz on 2026-05-02</p>
                    </footer>

                    <div class="actions">
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </div>
                </article>

                <!-- Example Topic 2 -->
                <article class="topic-item">
                    <h3>
                        <a href="topic.html?id=2">How to use PHP PDO?</a>
                    </h3>
                    
                    <footer>
                        <p>Posted by: Student Name on 2026-05-01</p>
                    </footer>

                    <div class="actions">
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </div>
                </article>

            </div>
        </section>
    </main>

    <!-- Essential: Link to the JS file for functionality -->
    <script src="board.js"></script>
</body>
</html>
