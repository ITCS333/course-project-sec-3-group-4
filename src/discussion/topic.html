<!--
  Requirement: Create the Page for a Single Discussion Topic
  Instructions:
  This page displays the original post of a topic, all its replies,
  and a form to add a new reply.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding (UTF-8) and responsive viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Topic Details</title>

    <!-- Link to CSS stylesheet -->
    <link rel="stylesheet" href="../../css/style.css">

    <!-- Required: link topic.js with defer. -->
    <script src="topic.js" defer></script>
</head>
<body>

    <header>
        <!-- topic.js will set its textContent to the topic's subject. -->
        <h1 id="topic-subject"></h1>
    </header>

    <main>

        <!-- Section 1: Original Post -->
        <article id="original-post">
            <!-- topic.js will set its textContent to the topic's message. -->
            <p id="op-message"></p>

            <!-- topic.js will set its textContent to "Posted by: {author} on {created_at}". -->
            <footer id="op-footer"></footer>

            <!-- Container for action buttons (Edit/Delete) injected by topic.js -->
            <div id="op-actions"></div>
        </article>

        <hr>

        <!-- Section 2: Replies -->
        <section id="replies-section">
            <h2>Replies</h2>

            <!-- Container to hold the list of reply articles (Required by topic.js) -->
            <div id="reply-list-container">
                <!-- topic.js will inject one <article> per reply here. -->
            </div>

            <hr>

            <!-- Section 3: Add a Reply Form -->
            <form id="reply-form" action="#">
                <fieldset>
                    <legend>Your Reply</legend>

                    <label for="new-reply">Reply Message:</label>
                    <textarea id="new-reply" rows="4" required></textarea>

                    <br><br>

                    <button type="submit">Post Reply</button>
                </fieldset>
            </form>
        </section>

    </main>
</body>
</html>
