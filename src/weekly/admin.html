<!--
  Requirement: Create the Admin View for the Weekly Breakdown

  Instructions:
  Fill in the HTML elements as described in the comments.
  This page allows the teacher (admin) to perform full CRUD operations
  on the weekly course content.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: Add the <meta> tag for character encoding (UTF-8). -->
  <meta charset="UTF-8">

    <!-- TODO: Add the responsive viewport <meta> tag
         (width=device-width, initial-scale=1.0). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TODO: Add a <title>, e.g., "Manage Weekly Breakdown". -->
  <title>Manage Weekly Breakdown</title>

    <!-- TODO: Link to your CSS framework or stylesheet. -->
<link rel="stylesheet" href="common/styles.css">
    <!-- Required: link admin.js with defer. -->
    <script src="admin.js" defer></script>
</head>
<body>

    <!-- TODO: Create a <header> containing an <h1>
         "Manage Weekly Breakdown". -->
  <header>
<h1>📋Manage Weekly Breakdown</h1>
  </header>
    <!-- TODO: Create the <main> content area. -->
<main>
        <!-- ============================================================
             Section 1: Add / Edit Week Form
             ============================================================ -->
        <!-- TODO: Create a <section> for the form. -->
<section>
            <!-- TODO: Add a sub-heading <h2> "Add a New Week". -->
<h2>➕Add a New Week</h2>
            <!-- TODO: Create a <form id="week-form"> (action can be "#").
                 The id is required by admin.js. -->
<form id="week-form" action="#" method="post">
                <!-- TODO: Use a <fieldset> to group the form controls. -->
                    <!-- TODO: Add a <legend>, e.g., "Weekly Details". -->
<fieldset>
          <legend>🗓️Weekly Details</legend>
                    <!-- TODO: Add a <label> and <input> for the week title.
                         - label for="week-title"
                         - input id="week-title", type="text", required
                         - Placeholder: "Week 1: Introduction to HTML" -->
<div>
            <label for="week-title">🏷️Week Title</label>
            <input
              id="week-title"
              name="week-title"
              type="text"
              required
              placeholder="Week 1: Introduction to HTML"
            >
          </div>
                    <!-- TODO: Add a <label> and <input> for the start date.
                         - label for="week-start-date"
                         - input id="week-start-date", type="date", required
                         - Maps to the start_date column in the weeks table. -->

  <div>
            <label for="week-start-date">📅Start Date</label>
            <input
              id="week-start-date"
              name="week-start-date"
              type="date"
              required
            >
          </div>

                    <!-- TODO: Add a <label> and <textarea> for the week
                         description.
                         - label for="week-description"
                         - textarea id="week-description", rows="5"
                         - Maps to the description column in the weeks table. -->
  <div>
            <label for="week-description">Description &amp; Notes🔑</label>
            <textarea
              id="week-description"
              name="week-description"
              rows="5"
            >
            </textarea>
          </div>

                    <!-- TODO: Add a <label> and <textarea> for resource links
                         (one URL per line).
                         - label for="week-links"
                         - textarea id="week-links", rows="3"
                         - Maps to the links column (JSON array) in the
                           weeks table. admin.js will split the textarea
                           value on newlines and send it as an array. -->
<div>
            <label for="week-links">Exercises / Resources Links🔑</label>
            <textarea
              id="week-links"
              name="week-links"
              rows="3"
            >
            </textarea>
          </div>
                    <!-- TODO: Add a submit <button>.
                         - id="add-week", type="submit"
                         - Text: "Add Week"
                         - When the form is in edit mode, admin.js will
                           change the button text to "Update Week" and
                           store the id being edited in a data attribute. -->
  <div>
            <button id="add-week" type="submit">Add Week🚀</button>
          </div>
                <!-- End of <fieldset> -->
            <!-- End of <form> -->
        <!-- End of form <section> -->
  </fieldset>
        </form>
    </section>


        <!-- ============================================================
             Section 2: Existing Weekly Entries
             ============================================================ -->
        <!-- TODO: Create a <section> to display the current list of weeks. -->
  <section>

            <!-- TODO: Add a sub-heading <h2> "Current Weekly Breakdown". -->
    <h2>📚Current Weekly Breakdown</h2>

            <!-- TODO: Create a <table id="weeks-table">. -->
    <table id="weeks-table">

                <!-- TODO: Create a <thead> with a <tr> containing <th>
                     elements:
                     - "Week Title"
                     - "Start Date"
                     - "Description"
                     - "Actions"
                     The columns must match the data rendered by
                     admin.js createWeekRow(). -->
      <thead>
          <tr>
            <th scope="col">Week Title</th>
            <th scope="col">Start Date</th>
            <th scope="col">Description</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>

                <!-- TODO: Create a <tbody id="weeks-tbody">.
                     The id is required by admin.js so it can inject
                     <tr> rows. admin.js will clear and repopulate this
                     tbody whenever the data changes. -->
<tbody id="weeks-tbody">
                <!-- admin.js will inject rows here. Each row follows
                     this structure (do NOT hardcode real data):

                <tr>
                    <td>Week 1: Introduction to HTML</td>
                    <td>2025-01-13</td>
                    <td>Learn HTML fundamentals...</td>
                    <td>
                        <button class="edit-btn"   data-id="1">Edit</button>
                        <button class="delete-btn" data-id="1">Delete</button>
                    </td>
                </tr>

                The data-id attribute holds the integer id from the
                weeks table (primary key). -->
</tbody>
            <!-- End of <table> -->
</table>
        <!-- End of list <section> -->
  </section>

    <!-- End of <main> -->
</main>
</body>
</html>
